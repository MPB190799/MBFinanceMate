<!DOCTYPE html>
<html lang="de">
  <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>MBFinanceMate – Dashboard</title>
  
      <!-- Styles & Favicon liegen direkt in /public -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="styles.css?v=1" />
      <link rel="icon" type="image/png" href="favicon.png" />
      <meta name="description" content="MBFinanceMate — Kostenloses Portfolio-Dashboard von MB Capital Strategies. YOC-Tracker, Dividenden-Kalender, Sektor-Analyse und Marktzyklen.">
      <meta name="author" content="Marco Bozem">
      <meta property="og:title" content="MBFinanceMate Dashboard">
      <meta property="og:description" content="Kostenloses Portfolio-Dashboard mit YOC-Tracker, Dividenden-Kalender und Marktzyklen.">
      <meta property="og:type" content="website">
      <meta property="og:locale" content="de_DE">
      <meta name="twitter:card" content="summary">
      <meta name="twitter:title" content="MBFinanceMate Dashboard">
      <meta name="twitter:creator" content="@MBCapitalStrat">
  </head>
<body>
      <noscript>Bitte JavaScript aktivieren – MBFinanceMate benötigt JS.</noscript>

    <!-- ===== Header ===== -->
    <header class="header">
          <img class="logo" src="logo.png" alt="MBFinanceMate Logo" />
          <h1>MBFinanceMate</h1>
    </header>header>

    <!-- ===== Tabs ===== -->
    <nav class="tabs container">
          <button class="tabbtn active" data-tab="portfolio" type="button">Portfolio</button>button>
          <button class="tabbtn" data-tab="news" type="button">News &amp; Reports</button>button>
          <button class="tabbtn" data-tab="charts" type="button">Charts &amp; Analytics</button>button>
          <button class="tabbtn" data-tab="cycles" type="button">Market Cycles</button>button>
          <button class="tabbtn" data-tab="dividends" type="button">Dividends</button>button>
          <button class="tabbtn" data-tab="sector" type="button">Sector Analysis</button>button>
          <button class="tabbtn" data-tab="analyse" type="button">Analyse</button>button>
    </nav>nav>

    <!-- ===== Dynamischer Content ===== -->
    <main id="content" class="container">
          <!-- Hier lädt tabs.js die Seiten aus /pages/*.html -->
    </main>main>

    <!-- ===== Scripts ===== -->
    <!-- Dein bestehendes Portfolio-Frontend -->
    <script src="/portfolio.js" defer></script>

    <!-- News / Sektoren / Zyklen / Dividenden / Analyse -->
    <script src="/news.js" defer></script>
    <script src="/sector.js" defer></script>
    <script src="/dividends.js" defer></script>
    <script src="/cycles.js" defer></script>
    <script src="/analyse.js" defer></script>

    <!-- Tab-Controller (muss nach den anderen geladen werden) -->
    <script src="/tabs.js" defer></script>

    <!-- Scroll Reveal with IntersectionObserver -->
    <script>
          document.addEventListener("DOMContentLoaded",()=>{const e=document.querySelectorAll(".glass-card,.data-table,section,h2,h3");e.forEach(e=>e.classList.add("scroll-reveal"));const o=new IntersectionObserver(e=>{e.forEach(e=>{e.isIntersecting&&(e.target.classList.add("revealed"),o.unobserve(e.target))})},{threshold:.1});document.querySelectorAll(".scroll-reveal").forEach(e=>o.observe(e))});
    </script>
</body>
</html>html>
    </script></h1></noscript>
</body></title>
  </head>
